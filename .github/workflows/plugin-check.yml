name: Plugin Check

on:
  pull_request:
    branches:
      - trunk
      - main

jobs:
  plugin-check:
    name: Run Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'
          exclude-checks: |
            plugin_review_phpcs
          ignore-codes: |
            hidden_files
            ai_instruction_directory
            github_directory
            unexpected_markdown_file
